# ──────────────────────────────────────────────────────────────
# LTX-2 Video Generation — Docker Compose (GPU mode)
# ──────────────────────────────────────────────────────────────
#
# Prerequisites:
#   1. NVIDIA Driver ≥ 525.60
#   2. NVIDIA Container Toolkit installed and configured:
#      https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#
# Build:
#   docker build -t ltx-video .
#
# Quick start:
#   docker compose up -d
#   docker compose logs -f          # watch startup
#
# After first start, download models (~100 GB):
#   See: modeldownload.sh or API docs
#
# Web UI:
#   Open http://localhost:8000 in browser
#
# API-only mode (no GPU):
#   docker compose -f docker-compose.yml -f docker-compose.api.yml up -d
#
# ──────────────────────────────────────────────────────────────

services:
  ltx-video:
    image: ltx-video-web
    container_name: ltx-video-web
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "${LTX_PORT:-8000}:8000"

    volumes:
      - ./data:/data
      - ./hf_cache:/root/.cache/huggingface

    environment:
      - LTX_APP_DATA_DIR=/data
      - LTX_PORT=8000
      - LTX_AUTH_TOKEN=${LTX_AUTH_TOKEN:-}
      - LTX_ADMIN_TOKEN=${LTX_ADMIN_TOKEN:-}
      - LTX_API_KEY=${LTX_API_KEY:-}
      - HF_ENDPOINT=https://hf-mirror.com

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
